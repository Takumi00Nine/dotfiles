# ── Claude Code compatibility (official: code.claude.com/docs/en/terminal-config) ──
# allow-passthrough: let desktop notifications + the progress bar reach the outer terminal.
# extended-keys:     let tmux distinguish Shift+Enter from plain Enter (newline shortcut).
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ── Prefix: use Ctrl+a instead of Ctrl+b ──
unbind C-b
set -g prefix C-a
# Press Ctrl+a twice to send a literal Ctrl+a to the app (e.g. shell start-of-line).
bind C-a send-prefix

# ── General ──
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor passthrough
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 10
set -g focus-events on

# ── Status bar ──
set -g status on
set -g status-interval 1                     # re-render every 1s so the ↻ countdown ticks per second
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour235,fg=colour250"
# Session chip turns red while the prefix (Ctrl+a) is armed and waiting for the next key.
set -g status-left "#[bg=#{?client_prefix,colour196,colour235},fg=#{?client_prefix,colour231,colour114},bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#(/Users/takumi009/work/usage-statusline/tmux-usage.sh) #[fg=colour240]│ #[fg=colour244]%H:%M "
set -g status-right-length 150

# Reload config quickly with prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── Directional splits: prefix + arrow splits the pane toward that direction ──
# (new pane opens in the same working directory). Overrides the default
# prefix+arrow pane navigation — use Shift + arrow keys to move between panes.
bind Left  split-window -hb -c "#{pane_current_path}"
bind Right split-window -h  -c "#{pane_current_path}"
bind Up    split-window -vb -c "#{pane_current_path}"
bind Down  split-window -v  -c "#{pane_current_path}"

# Pane navigation without prefix: Shift + arrow keys
bind -n S-Left  select-pane -L
bind -n S-Down  select-pane -D
bind -n S-Up    select-pane -U
bind -n S-Right select-pane -R
